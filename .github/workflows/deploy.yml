name: Build & Deploy

on:
  push:
    branches: [main]       # main 分支推送时触发
  pull_request:
    branches: [main]       # PR 时只跑测试，不部署

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # 格式: your-user/your-repo
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: 构建并推送镜像到 GitHub Container Registry ──
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write     # 推送镜像需要此权限

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}   # PR 时只构建不推送
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha          # 利用 GitHub Actions 构建缓存
          cache-to: type=gha,mode=max

  # ── Job 2: 部署到阿里云服务器（仅 push to main 时执行）──
  deploy:
    name: Deploy to Server
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Setup SSH key
        env:
          SSH_KEY_B64: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          # 打印密钥指纹（不暴露私钥内容）
          echo "=== Key fingerprint in CI ==="
          ssh-keygen -l -f ~/.ssh/deploy_key

      - name: Test SSH connection (debug)
        run: |
          ssh -v \
              -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o PasswordAuthentication=no \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              'echo SSH_OK' 2>&1 || true

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o PasswordAuthentication=no \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              bash << 'EOF'
            set -e
            cd /var/www/myblog
            echo "GITHUB_USER=${{ github.repository_owner }}" > .env
            echo "GITHUB_REPO=$(echo "${{ github.repository }}" | cut -d'/' -f2)" >> .env
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull app
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "✅ Deployment complete"
          EOF

  # ── Job 3: 部署后健康检查 ──
  healthcheck:
    name: Health Check
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Wait for service to start
        run: sleep 15

      - name: Check HTTP response
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://${{ secrets.SERVER_HOST }}:8080)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed! Status: $STATUS"
            exit 1
          fi
          echo "✅ Service is healthy"

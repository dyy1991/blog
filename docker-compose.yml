services:
  app:
    # 镜像由 GitHub Actions 构建后推送到 GHCR，服务器直接拉取
    image: ghcr.io/${GITHUB_USER}/${GITHUB_REPO}:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app


services:
  app:
    image: ghcr.io/${GITHUB_USER}/${GITHUB_REPO}:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/support.db
    volumes:
      - support_data:/data   # SQLite 数据库持久化

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  support_data:             # 命名 volume，docker-compose down 不会删除
